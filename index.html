<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Mini Multiplayer Visual</title>
<style>
body { margin:0; padding:0; font-family:sans-serif; background:#222; color:#eee; text-align:center; }
#roomDiv, #game { margin-top:20px; }
button { margin:5px; padding:10px; cursor:pointer; }
#game { display:none; position:relative; width:800px; height:500px; margin:20px auto; border:2px solid #eee; background:#333; overflow:hidden; }
.player { position:absolute; width:50px; height:50px; }
#player1 { background:red; }
#player2 { background:blue; }
.healthBar { height:5px; background:lime; width:100%; position:absolute; top:-10px; }
.bullet { position:absolute; width:10px; height:10px; background:yellow; border-radius:50%; }
#scoreboard { margin-bottom:10px; font-size:18px; }
</style>
</head>
<body>
<h1>Mini Multiplayer Visual</h1>

<div id="roomDiv">
  <input type="text" id="roomIdInput" placeholder="Código da Sala">
  <button onclick="createRoom()">Criar Sala</button>
  <button onclick="joinRoom()">Entrar na Sala</button>
</div>

<div id="game">
  <div id="scoreboard"></div>
  <div id="player1" class="player"><div class="healthBar" id="hp1"></div></div>
  <div id="player2" class="player"><div class="healthBar" id="hp2"></div></div>
</div>

<!-- Firebase compat scripts -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
// === Configuração do Firebase (já com seus dados) ===
const firebaseConfig = {
  apiKey: "AIzaSyBnGBqNYQewQsX-rHVwRrcrqbw1Dw27lvM",
  authDomain: "minimultiplayergame-f508c.firebaseapp.com",
  projectId: "minimultiplayergame-f508c",
  storageBucket: "minimultiplayergame-f508c.firebasestorage.app",
  messagingSenderId: "766336023232",
  appId: "1:766336023232:web:1ca9f60f4ccff2537f4b25",
  measurementId: "G-KHR7PB90RP"
};

// Inicializa Firebase
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// === Variáveis do jogo ===
let roomId="", playerId=Math.random().toString(36).substr(2,5);
let isCreator=false, players=[], bullets=[];
let interval;

// === Criar Sala ===
async function createRoom() {
  roomId = Math.random().toString(36).substr(2,5).toUpperCase();
  isCreator = true;
  players = [{id:playerId, x:50, y:200, life:3, points:0}];
  await db.collection("rooms").doc(roomId).set({players:players});
  startGame();
}

// === Entrar Sala ===
async function joinRoom() {
  const input = document.getElementById("roomIdInput").value.toUpperCase();
  const roomRef = db.collection("rooms").doc(input);
  const snap = await roomRef.get();
  if(!snap.exists) return alert("Sala não existe");
  let data = snap.data();
  if(data.players.length>=2) return alert("Sala cheia!");
  roomId = input;
  players = data.players;
  players.push({id:playerId, x:700, y:200, life:3, points:0});
  await roomRef.update({players:players});
  startGame();
}

// === Iniciar Jogo ===
function startGame() {
  document.getElementById("roomDiv").style.display="none";
  document.getElementById("game").style.display="block";
  listenRoom();
  interval = setInterval(gameLoop,30);
}

// === Ouvir mudanças na sala ===
function listenRoom() {
  db.collection("rooms").doc(roomId).onSnapshot(doc=>{
    let data = doc.data();
    if(!data) return;
    players = data.players;
    updateVisual();
  });
}

// === Atualizar visual ===
function updateVisual() {
  const p1 = document.getElementById("player1");
  const p2 = document.getElementById("player2");
  if(players[0]) { p1.style.left=players[0].x+"px"; p1.style.top=players[0].y+"px"; document.getElementById("hp1").style.width=(players[0].life/3*100)+"%"; }
  if(players[1]) { p2.style.left=players[1].x+"px"; p2.style.top=players[1].y+"px"; document.getElementById("hp2").style.width=(players[1].life/3*100)+"%"; }
  document.getElementById("scoreboard").innerText=`${players[0]?.id || ""}: ${players[0]?.points || 0} | ${players[1]?.id || ""}: ${players[1]?.points || 0}`;
}

// === Atirar ===
function shoot() {
  let bullet = {x:players.find(p=>p.id===playerId).x+25, y:players.find(p=>p.id===playerId).y+20, owner:playerId};
  bullets.push(bullet);
}

// === Loop de jogo ===
function gameLoop() {
  bullets.forEach((b,i)=>{
    b.x += (b.owner===players[0]?.id?5:-5);
    if(b.x<0||b.x>800){ bullets.splice(i,1); return; }
    let target = players.find(p=>p.id!==b.owner);
    if(target && b.x>=target.x && b.x<=target.x+50 && b.y>=target.y && b.y<=target.y+50){
      target.life-=1;
      if(target.life<=0){
        target.life=3;
        let shooter = players.find(p=>p.id===b.owner);
        shooter.points+=1;
      }
      bullets.splice(i,1);
    }
  });
  db.collection("rooms").doc(roomId).update({players:players});
  updateVisual();
}

// === Controles ===
document.addEventListener("keydown", e=>{
  let p = players.find(p=>p.id===playerId);
  if(!p) return;
  if(playerId===players[0]?.id){
    if(e.key==="w") p.y-=5;
    if(e.key==="s") p.y+=5;
    if(e.key==="a") p.x-=5;
    if(e.key==="d") p.x+=5;
    if(e.key===" ") shoot();
  } else {
    if(e.key==="ArrowUp") p.y-=5;
    if(e.key==="ArrowDown") p.y+=5;
    if(e.key==="ArrowLeft") p.x-=5;
    if(e.key==="ArrowRight") p.x+=5;
    if(e.key==="Enter") shoot();
  }
});

// === Expulsar jogador ===
async function expel() {
  if(!isCreator) return;
  let roomRef = db.collection("rooms").doc(roomId);
  let snap = await roomRef.get();
  let data = snap.data();
  data.players = data.players.filter(p=>p.id===playerId);
  await roomRef.update({players:data.players});
  alert("Jogador expulso!");
}
</script>
</body>
</html>
